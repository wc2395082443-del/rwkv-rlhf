full = [
  "latex2sympy2-extended",
  "liger-kernel",
  "math-verify",
  "pre-commit",
]

[tool.uv]
package = true

[tool.setuptools.packages.find]
where = ["src/cli"]
include = ["helicopter_cli*"]
